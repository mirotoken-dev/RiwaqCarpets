<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Wishlist — MaisonTapis</title>
  <meta name="description" content="Your saved luxury carpet favourites. Share them via WhatsApp." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪅</text></svg>" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>

<header id="navbar" class="navbar"></header>
<div id="mobile-nav" class="mobile-nav"></div>

<div class="promo-banner">
  <span data-lang-key="promo_text">Order via WhatsApp with code</span>
  <strong> <span class="promo-code" data-lang-key="promo_code">SAVE10</span> </strong>
  <span data-lang-key="promo_suffix">and get 10% off your order</span>
</div>

<!-- WISHLIST HERO -->
<div class="catalog-hero" style="padding-bottom:2.5rem">
  <div class="gold-divider" style="margin-bottom:1.25rem"></div>
  <h1 data-lang-key="wishlist_title">My Wishlist</h1>
  <p id="wishlist-subtitle" data-lang-key="wishlist_sub">Your saved carpet favourites</p>
</div>

<!-- SHARE BAR -->
<div id="share-bar" class="wishlist-share-bar">
  <span id="wishlist-count-label"></span>
  <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center">
    <button class="btn-secondary" id="btn-clear-wishlist" data-lang-key="wishlist_clear">Clear All</button>
    <a id="btn-share-wa" href="#" target="_blank" rel="noopener" class="btn-whatsapp" style="font-size:.85rem;padding:.65rem 1.4rem">
      <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
      <span data-lang-key="wishlist_share_btn">Share Wishlist on WhatsApp</span>
    </a>
  </div>
</div>

<!-- GRID -->
<div style="padding:2.5rem clamp(1.5rem,5vw,4rem) 5rem;max-width:1400px;margin:0 auto">
  <div id="wishlist-grid" class="products-grid">
    <div class="skeleton" style="height:420px;border-radius:2px"></div>
    <div class="skeleton" style="height:420px;border-radius:2px"></div>
    <div class="skeleton" style="height:420px;border-radius:2px"></div>
  </div>
</div>

<footer id="footer" class="footer"></footer>

<a id="whatsapp-float" class="whatsapp-float" target="_blank" rel="noopener" aria-label="WhatsApp">
  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
</a>

<script type="module">
import { initShared, fetchProducts, buildProductCard, WA_NUMBER, PROMO_CODE } from '/src/app.js';
import { Wishlist } from '/src/wishlist.js';
import { LangSystem } from '/src/lang.js';

initShared('wishlist');

const grid = document.getElementById('wishlist-grid');
const shareBar = document.getElementById('share-bar');
const countLabel = document.getElementById('wishlist-count-label');
const shareBtn = document.getElementById('btn-share-wa');
const clearBtn = document.getElementById('btn-clear-wishlist');

async function render() {
  const ids = Wishlist.get();
  const all = await fetchProducts();
  const products = ids.map(id => all.find(p => p.id === id)).filter(Boolean);

  // Update count
  const count = products.length;
  const label = count === 1
    ? `1 ${LangSystem.t('wishlist_item')}`
    : `${count} ${LangSystem.t('wishlist_items')}`;
  if (countLabel) countLabel.textContent = label;
  shareBar.style.display = count > 0 ? 'flex' : 'none';

  if (count === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div style="font-size:3.5rem;margin-bottom:1.25rem">🤍</div>
        <h3>${LangSystem.t('wishlist_empty_title')}</h3>
        <p style="margin-bottom:1.75rem">${LangSystem.t('wishlist_empty_sub')}</p>
        <a href="/catalog.html" class="btn-primary">${LangSystem.t('wishlist_browse')}</a>
      </div>`;
    return;
  }

  grid.innerHTML = products.map(p => buildProductCard(p)).join('');

  // Build WhatsApp share message
  const lang = LangSystem.current;
  const lines = products.map(p => {
    const name = lang === 'ar' ? p.nameAr : p.nameEn;
    return `• ${name} (${p.ref}) – $${p.price.toLocaleString()}`;
  });
  const msg = lang === 'ar'
    ? `مرحبا! هذه قائمة السجاد المفضل لدي:\n\n${lines.join('\n')}\n\nكود الخصم: ${PROMO_CODE}`
    : `Hi! Here's my carpet wishlist:\n\n${lines.join('\n')}\n\nPromo code: ${PROMO_CODE}`;
  shareBtn.href = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
}

clearBtn?.addEventListener('click', () => {
  if (confirm(LangSystem.t('wishlist_confirm_clear'))) {
    Wishlist.clear();
    render();
  }
});

window.addEventListener('wishlist-changed', render);

render();
</script>
</body>
</html>
