<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog — MaisonTapis Luxury Carpets</title>
  <meta name="description" content="Browse the full collection of luxury handcrafted carpets. Filter by color, size, style, and material." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪅</text></svg>" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>

<header id="navbar" class="navbar"></header>
<div id="mobile-nav" class="mobile-nav"></div>

<!-- PROMO BANNER -->
<div class="promo-banner">
  <span data-lang-key="promo_text">Order via WhatsApp with code</span>
  <strong> <span class="promo-code" data-lang-key="promo_code">SAVE10</span> </strong>
  <span data-lang-key="promo_suffix">and get 10% off your order</span>
</div>

<!-- CATALOG HERO -->
<div class="catalog-hero">
  <div class="gold-divider" style="margin-bottom:1.25rem"></div>
  <h1 data-lang-key="catalog_title">Our Collection</h1>
  <p data-lang-key="catalog_sub">Browse our complete selection of luxury handcrafted carpets</p>
</div>

<div class="catalog-layout">

  <!-- FILTERS SIDEBAR -->
  <aside class="filter-sidebar">
    <div class="filter-header">
      <h3 data-lang-key="filter_title">Filters</h3>
      <button class="btn-clear" id="btn-clear" data-lang-key="filter_clear">Clear All</button>
    </div>

    <div class="filter-group">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="search-input" data-lang-key="search_placeholder" placeholder="Search carpets..." />
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label" data-lang-key="filter_color">Color</label>
      <div class="color-filters" id="color-filters"></div>
    </div>

    <div class="filter-group">
      <label class="filter-label" data-lang-key="filter_size">Size</label>
      <select class="filter-select" id="size-filter">
        <option value="" data-lang-key="all_sizes">All Sizes</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label" data-lang-key="filter_style">Style</label>
      <select class="filter-select" id="style-filter">
        <option value="" data-lang-key="all_styles">All Styles</option>
        <option value="Modern">Modern</option>
        <option value="Classic">Classic</option>
        <option value="Oriental">Oriental</option>
        <option value="Geometric">Geometric</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label" data-lang-key="filter_material">Material</label>
      <select class="filter-select" id="material-filter">
        <option value="" data-lang-key="all_materials">All Materials</option>
      </select>
    </div>
  </aside>

  <!-- PRODUCTS AREA -->
  <main>
    <div class="results-header">
      <span class="results-count" id="results-count">
        <span data-lang-key="results_showing">Showing</span>
        <strong id="count-num">0</strong>
        <span data-lang-key="results_of">of</span>
        <strong id="count-total">0</strong>
        <span data-lang-key="results_carpets">carpets</span>
      </span>
    </div>
    <div id="catalog-grid" class="products-grid">
      <div class="skeleton" style="height:420px;border-radius:2px"></div>
      <div class="skeleton" style="height:420px;border-radius:2px"></div>
      <div class="skeleton" style="height:420px;border-radius:2px"></div>
    </div>
  </main>

</div>

<footer id="footer" class="footer"></footer>

<a id="whatsapp-float" class="whatsapp-float" target="_blank" rel="noopener" aria-label="WhatsApp">
  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
</a>

<script type="module" src="/src/catalog.js"></script>
</body>
</html>
